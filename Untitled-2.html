        body {

            margin: 0;

        }

        header {
            background-color: var(--light-blue);

        nav {

        }

        h2 { color: var(--dark); }
        
        label {
            display: block;
            margin: 10px 0;
            cursor: pointer;
            font-family: 'Lato', sans-serif;
        }

        button {
            background-color: var(--light-blue);
            color: var(--dark);
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #8ec0ef;
            transform: translateY(-2px);
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
            color: #28a745;
        }
    </style>
</head>

<script>
    function calculateResult() {
        const form = document.getElementById('quizForm');
        let score = 0;
        const total = 3;

        const answers = new FormData(form);
        for (let value of answers.values()) {
            if (value === 'correct') score++;
        }

        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `Твой результат: ${score} из ${total}`;
        
        if(score === total) {
            resultDiv.style.color = "#28a745";
            resultDiv.innerHTML += " — Отлично! Ты настоящий прораб ботов! 🤖";
        } else {
            resultDiv.style.color = "#ffc107";
            resultDiv.innerHTML += " — Неплохо, но можно повторить теорию.";
        }
    }
</script>
