<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет | Курс Python</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --light-blue: #a2d2ff;
            --gray: #6c757d;
            --light-gray: #f8f9fa;
            --white: #ffffff;
            --dark: #333;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--light-gray);
            margin: 0;
        }

        nav {
            background: var(--white);
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: var(--gray);
            font-family: 'Lato', sans-serif;
        }

        .profile-container {
            max-width: 600px;
            margin: 50px auto;
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .profile-header {
            background: var(--light-blue);
            padding: 40px;
            text-align: center;
            color: var(--dark);
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: var(--white);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .profile-body {
            padding: 30px;
        }

        .progress-section {
            margin-top: 20px;
        }

        .progress-bar {
            background: #e9ecef;
            border-radius: 10px;
            height: 25px;
            width: 100%;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-fill {
            background: var(--light-blue);
            height: 100%;
            width: 65%; /* Здесь задается прогресс */
            text-align: center;
            color: white;
            font-size: 14px;
            line-height: 25px;
            font-weight: bold;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: var(--light-gray);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card span {
            display: block;
            font-size: 20px;
            font-weight: bold;
            color: var(--light-blue);
        }
    </style>
</head>
<body>

<nav>
    <a href="Untitled-1.html">Главная</a>
    <a href="Untitled-1.html">Видео</a>
    <a href="Untitled-2.html">Проверка знаний</a>
    <a href="profile.html"><b>Личный кабинет</b></a>
</nav>

<div class="profile-container">
    <div class="profile-header">
        <div class="avatar"></div>
        <h2>Тарханова Венера</h2>
        <p>10-11 класс</p>
    </div>

    <div class="profile-body">
        <h3>Ваш прогресс в курсе</h3>
        <div class="progress-section">
            <p>Общее завершение: 65%</p>
            <div class="progress-bar">
                <div class="progress-fill">65%</div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <span>4</span>
                Уроков пройдено
            </div>
            <div class="stat-card">
                <span>12</span>
                Баллов за тесты
            </div>
        </div>

        <h3 style="margin-top: 30px;">Достижения</h3>
        <div style="font-size: 24px;">
            Мастер
        </div>
    </div>
</div>

</body>
</html>
